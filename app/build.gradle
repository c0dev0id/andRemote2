plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace 'de.codevoid.andremote2'
    compileSdk 35

    defaultConfig {
        applicationId "de.codevoid.andremote2"
        minSdk 26
        targetSdk 35
        versionCode = (System.getenv("GITHUB_RUN_NUMBER") as String)?.toInteger() ?: 1
        versionName "1.0"
    }

    signingConfigs {
        release {
            def keystorePath = System.getenv("SIGNING_KEYSTORE_PATH")
            if (keystorePath) {
                storeFile file(keystorePath)
                storePassword System.getenv("SIGNING_KEYSTORE_PASSWORD")
                keyAlias System.getenv("SIGNING_KEY_ALIAS")
                keyPassword System.getenv("SIGNING_KEY_PASSWORD")
            }
        }
    }

    buildFeatures {
        buildConfig true
    }

    buildTypes {
        debug {
            def sha = System.getenv("GITHUB_SHA")
            def shortSha = sha ? sha.substring(0, Math.min(7, sha.length())) : "local"
            buildConfigField "String", "BUILD_COMMIT", "\"${shortSha}\""
        }
        release {
            def sha = System.getenv("GITHUB_SHA")
            def shortSha = sha ? sha.substring(0, Math.min(7, sha.length())) : "release"
            buildConfigField "String", "BUILD_COMMIT", "\"${shortSha}\""
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (System.getenv("SIGNING_KEYSTORE_PATH")) {
                signingConfig signingConfigs.release
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
